version: '3.8'

services:
  # バックエンド (API + Discord Bot)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "7070:7070"
    env_file:
      - apps/api/.env
    restart: always

  # フロントエンド (Next.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "3000:3000"
    restart: always
